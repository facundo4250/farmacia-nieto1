/* ── Color tokens ─────────────────────────────────────────── */
:root {
  --green-950: #143420;
  --green-900: #1e4d2b;
  --green-800: #225b30;
  --green-700: #2f6b3c;
  --green-600: #4e7a45;
  --green-500: #6f8f6c;
  --green-400: #8aa985;
  --green-300: #9bc3ae;
  --green-200: #c3dccb;
  --green-100: #e3efe4;
  --green-50:  #eff5ec;
  --mint-200: #cfe8e6;
  --mint-100: #e1f2f1;
  --mint-50:  #eef8f7;
  --cream-300: #f3e6c9;
  --cream-200: #f8ecd4;
  --cream-100: #fbf5e9;
  --cream-50:  #fefcf6;
  --gold-700: #b8881f;
  --gold-600: #d4a32c;
  --gold-500: #ddb438;
  --gold-400: #f2c94c;
  --gold-300: #f8dd86;
  --gold-100: #fbf0cf;
  --wood-700: #6f551a;
  --wood-500: #a06a3c;
  --wood-300: #c89b6f;
  --wood-100: #ecdcc6;
  --ink-900: #20291f;
  --ink-700: #2f3b2c;
  --ink-600: #3c4a3a;
  --ink-500: #5a6857;
  --ink-400: #7d8a79;
  --ink-300: #a7b0a1;
  --line-300: #d3dccb;
  --line-200: #e4e7d9;
  --line-100: #efeede;
  --white: #ffffff;
  --success: #4e7a45;
  --success-soft: #e3efe4;
  --warning: #d4a32c;
  --warning-soft: #fbf0cf;
  --danger: #b4503e;
  --danger-soft: #f6e2dc;
  --info: #4a7d86;
  --info-soft: #e1f2f1;

  --bg-page: var(--cream-100);
  --bg-paper: var(--cream-200);
  --surface-card: var(--cream-50);
  --surface-raised: var(--white);
  --surface-sunken: var(--cream-200);
  --surface-sage: var(--green-500);
  --surface-mint: var(--mint-100);
  --surface-forest: var(--green-900);
  --surface-cream: var(--cream-200);
  --text-strong: var(--ink-900);
  --text-body: var(--ink-600);
  --text-muted: var(--ink-400);
  --text-faint: var(--ink-300);
  --text-on-dark: var(--cream-100);
  --text-on-sage: var(--cream-50);
  --text-brand: var(--green-900);
  --text-accent: var(--wood-700);
  --brand-primary: var(--green-900);
  --brand-primary-hover: var(--green-800);
  --brand-primary-press: var(--green-950);
  --brand-secondary: var(--green-500);
  --brand-accent: var(--gold-500);
  --brand-accent-strong: var(--gold-700);
  --brand-wood: var(--wood-500);
  --border-subtle: var(--line-200);
  --border-default: var(--line-300);
  --border-strong: var(--green-300);
  --ring: color-mix(in oklab, var(--green-600) 55%, transparent);
  --ring-gold: color-mix(in oklab, var(--gold-500) 60%, transparent);
}

/* ── Typography tokens ────────────────────────────────────── */
:root {
  --font-script: 'Sacramento', 'Segoe Script', cursive;
  --font-serif:  'Cormorant Garamond', 'Hoefler Text', Georgia, 'Times New Roman', serif;
  --font-sans:   'Quicksand', ui-rounded, 'Segoe UI', system-ui, sans-serif;
  --weight-regular: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;
  --text-2xs: 0.6875rem;
  --text-xs:  0.75rem;
  --text-sm:  0.875rem;
  --text-base:1rem;
  --text-md:  1.125rem;
  --text-lg:  1.375rem;
  --text-xl:  1.75rem;
  --text-2xl: 2.25rem;
  --text-3xl: 3rem;
  --text-4xl: 4rem;
  --text-5xl: 5.5rem;
  --leading-tight: 1.08;
  --leading-snug: 1.2;
  --leading-normal: 1.5;
  --leading-relaxed: 1.7;
  --tracking-tight: -0.02em;
  --tracking-normal: 0;
  --tracking-wide: 0.04em;
  --tracking-wider: 0.12em;
  --tracking-caps: 0.18em;
}

/* ── Spacing / radius / shadow tokens ────────────────────── */
:root {
  --space-0: 0;
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.5rem;
  --space-6: 2rem;
  --space-7: 2.5rem;
  --space-8: 3rem;
  --space-9: 4rem;
  --space-10: 5rem;
  --space-12: 6rem;
  --space-16: 8rem;
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-xl: 26px;
  --radius-2xl: 36px;
  --radius-pill: 999px;
  --border-hairline: 1px;
  --border-thin: 1.5px;
  --border-thick: 2px;
  --shadow-xs: 0 1px 2px rgba(30, 77, 43, 0.06);
  --shadow-sm: 0 2px 6px rgba(30, 77, 43, 0.07), 0 1px 2px rgba(30, 77, 43, 0.05);
  --shadow-md: 0 6px 18px rgba(30, 77, 43, 0.09), 0 2px 6px rgba(30, 77, 43, 0.05);
  --shadow-lg: 0 16px 40px rgba(30, 77, 43, 0.12), 0 4px 12px rgba(30, 77, 43, 0.06);
  --shadow-xl: 0 28px 64px rgba(20, 52, 32, 0.16), 0 8px 20px rgba(20, 52, 32, 0.08);
  --shadow-gold: 0 8px 22px rgba(221, 180, 56, 0.28);
  --shadow-inset: inset 0 1px 2px rgba(30, 77, 43, 0.08);
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --dur-fast: 140ms;
  --dur-base: 220ms;
  --dur-slow: 380ms;
  --container-sm: 640px;
  --container-md: 880px;
  --container-lg: 1120px;
  --container-xl: 1320px;
}

/* ── Base resets ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  margin: 0;
  background: var(--bg-page);
  color: var(--text-body);
  font-family: var(--font-sans);
  font-size: var(--text-base);
  font-weight: var(--weight-regular);
  line-height: var(--leading-relaxed);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
h1, h2, h3, h4, h5 {
  font-family: var(--font-serif);
  font-weight: 600;
  line-height: var(--leading-snug);
  color: var(--text-strong);
  margin: 0 0 0.5em;
  text-wrap: balance;
}
h1 { font-size: var(--text-3xl); line-height: var(--leading-tight); letter-spacing: var(--tracking-tight); }
h2 { font-size: var(--text-2xl); line-height: var(--leading-tight); }
h3 { font-size: var(--text-xl); }
p { margin: 0 0 1em; text-wrap: pretty; }
a { color: var(--green-800); text-decoration-color: color-mix(in oklab, var(--green-600) 40%, transparent); text-underline-offset: 2px; transition: color var(--dur-fast) var(--ease-soft); }
a:hover { color: var(--green-950); }
img { max-width: 100%; display: block; }
button { font-family: inherit; }
::selection { background: color-mix(in oklab, var(--gold-400) 55%, transparent); color: var(--ink-900); }
:focus-visible { outline: 2px solid var(--green-600); outline-offset: 2px; border-radius: var(--radius-xs); }
.nieto-script { font-family: var(--font-script); font-weight: 400; color: var(--green-700); line-height: 1; }
.nieto-eyebrow { font-family: var(--font-sans); font-weight: 600; font-size: var(--text-xs); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--green-600); }
.nieto-caps { font-family: var(--font-serif); font-weight: 600; letter-spacing: var(--tracking-wider); text-transform: uppercase; }

/* ── Button ───────────────────────────────────────────────── */
.fn-btn {
  --_bg: var(--brand-primary);
  --_fg: var(--cream-50);
  --_bd: transparent;
  font-family: var(--font-sans);
  font-weight: 600;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 0.55em;
  border: var(--border-thin) solid var(--_bd);
  background: var(--_bg);
  color: var(--_fg);
  border-radius: var(--radius-pill);
  cursor: pointer;
  text-decoration: none;
  white-space: nowrap;
  line-height: 1;
  transition: transform var(--dur-fast) var(--ease-out),
              background var(--dur-base) var(--ease-soft),
              box-shadow var(--dur-base) var(--ease-soft),
              border-color var(--dur-base) var(--ease-soft);
}
.fn-btn:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--ring); }
.fn-btn:active { transform: translateY(1px) scale(0.985); }
.fn-btn[disabled], .fn-btn[aria-disabled="true"] { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }
.fn-btn--sm { font-size: var(--text-sm); padding: 0.5rem 0.95rem; }
.fn-btn--md { font-size: var(--text-base); padding: 0.7rem 1.35rem; }
.fn-btn--lg { font-size: var(--text-md); padding: 0.9rem 1.8rem; }
.fn-btn--block { display: flex; width: 100%; }
.fn-btn--primary { --_bg: var(--brand-primary); --_fg: var(--cream-50); box-shadow: var(--shadow-sm); }
.fn-btn--primary:hover { --_bg: var(--brand-primary-hover); box-shadow: var(--shadow-md); }
.fn-btn--secondary { --_bg: var(--green-500); --_fg: var(--cream-50); box-shadow: var(--shadow-xs); }
.fn-btn--secondary:hover { --_bg: var(--green-600); box-shadow: var(--shadow-sm); }
.fn-btn--accent { --_bg: var(--gold-500); --_fg: var(--wood-700); box-shadow: var(--shadow-xs); }
.fn-btn--accent:hover { --_bg: var(--gold-400); box-shadow: var(--shadow-gold); }
.fn-btn--outline { --_bg: transparent; --_fg: var(--green-900); --_bd: var(--green-300); }
.fn-btn--outline:hover { --_bg: var(--green-50); --_bd: var(--green-500); }
.fn-btn--ghost { --_bg: transparent; --_fg: var(--green-800); }
.fn-btn--ghost:hover { --_bg: var(--green-100); }

/* ── Card ─────────────────────────────────────────────────── */
.fn-card {
  background: var(--surface-card); border-radius: var(--radius-lg);
  border: var(--border-hairline) solid var(--line-200);
  box-shadow: var(--shadow-sm); overflow: hidden;
  font-family: var(--font-sans); color: var(--ink-600);
  display: flex; flex-direction: column;
  transition: box-shadow var(--dur-base) var(--ease-soft), transform var(--dur-base) var(--ease-out), border-color var(--dur-base);
}
.fn-card--interactive { cursor: pointer; }
.fn-card--interactive:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); border-color: var(--green-200); }
.fn-card--flat { box-shadow: none; }
.fn-card--mint { background: var(--mint-100); border-color: var(--mint-200); }
.fn-card--sage { background: var(--green-500); border-color: transparent; color: var(--cream-50); }
.fn-card--forest { background: var(--green-900); border-color: transparent; color: var(--cream-100); }
.fn-card--cream { background: var(--cream-200); border-color: var(--cream-300); }
.fn-card__body { padding: 20px; display: flex; flex-direction: column; gap: 8px; }
.fn-card__body--lg { padding: 28px; }
.fn-card__title { font-family: var(--font-serif); font-weight: 600; font-size: var(--text-lg); color: inherit; margin: 0; line-height: 1.2; }
.fn-card__footer { padding: 14px 20px; border-top: var(--border-hairline) solid var(--line-200); display: flex; align-items: center; gap: 10px; }

/* ── Alert ────────────────────────────────────────────────── */
.fn-alert {
  display: flex; gap: 13px; align-items: flex-start;
  font-family: var(--font-sans); border-radius: var(--radius-lg);
  padding: 15px 17px; border: var(--border-thin) solid transparent;
  background: var(--green-50);
}
.fn-alert__icon { flex: none; display: flex; margin-top: 1px; }
.fn-alert__icon svg { width: 20px; height: 20px; }
.fn-alert__body { flex: 1; min-width: 0; }
.fn-alert__title { font-weight: 700; font-size: var(--text-sm); color: var(--ink-900); margin: 0 0 3px; }
.fn-alert__text { font-size: var(--text-sm); line-height: 1.55; color: var(--ink-600); margin: 0; }
.fn-alert--info { background: var(--info-soft); border-color: color-mix(in oklab, var(--info) 22%, transparent); }
.fn-alert--info .fn-alert__icon { color: var(--info); }
.fn-alert--success { background: var(--success-soft); border-color: color-mix(in oklab, var(--success) 28%, transparent); }
.fn-alert--success .fn-alert__icon { color: var(--green-600); }
.fn-alert--warning { background: var(--warning-soft); border-color: color-mix(in oklab, var(--warning) 30%, transparent); }
.fn-alert--warning .fn-alert__icon { color: var(--gold-700); }
.fn-alert--danger { background: var(--danger-soft); border-color: color-mix(in oklab, var(--danger) 28%, transparent); }
.fn-alert--danger .fn-alert__icon { color: var(--danger); }

/* ── Badge ────────────────────────────────────────────────── */
.fn-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--font-sans); font-weight: 600; font-size: var(--text-xs);
  line-height: 1; padding: 0.32em 0.7em; border-radius: var(--radius-pill);
  letter-spacing: .01em; white-space: nowrap;
}
.fn-badge__dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .85; }
.fn-badge--neutral { background: var(--green-100); color: var(--green-800); }
.fn-badge--success { background: var(--success-soft); color: var(--green-800); }
.fn-badge--warning { background: var(--warning-soft); color: var(--gold-700); }
.fn-badge--danger { background: var(--danger-soft); color: var(--danger); }
.fn-badge--info { background: var(--info-soft); color: var(--info); }
.fn-badge--gold { background: var(--gold-100); color: var(--wood-700); }
.fn-badge--solid { background: var(--brand-primary); color: var(--cream-50); }

/* ── Tag ──────────────────────────────────────────────────── */
.fn-tag {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--font-sans); font-weight: 600; font-size: var(--text-sm);
  line-height: 1; padding: 0.45em 0.85em; border-radius: var(--radius-pill);
  background: var(--cream-50); color: var(--green-900);
  border: var(--border-thin) solid var(--green-200);
  transition: background var(--dur-fast) var(--ease-soft), border-color var(--dur-fast) var(--ease-soft);
}
.fn-tag__dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold-500); flex: none; }
.fn-tag--clickable { cursor: pointer; }
.fn-tag--clickable:hover { border-color: var(--green-400); background: var(--green-50); }
.fn-tag--selected { background: var(--green-900); border-color: var(--green-900); color: var(--cream-50); }
.fn-tag--selected .fn-tag__dot { background: var(--gold-400); }

/* ── Form fields ──────────────────────────────────────────── */
.fn-field { display: flex; flex-direction: column; gap: 6px; font-family: var(--font-sans); }
.fn-field__label { font-size: var(--text-sm); font-weight: 600; color: var(--green-900); }
.fn-field__req { color: var(--gold-700); margin-left: 2px; }
.fn-field__wrap { position: relative; display: flex; align-items: center; }
.fn-field__icon { position: absolute; left: 14px; display: flex; color: var(--ink-400); pointer-events: none; }
.fn-field__icon svg { width: 18px; height: 18px; }
.fn-input {
  width: 100%; font-family: var(--font-sans); font-size: var(--text-base);
  color: var(--ink-700); background: var(--cream-50);
  border: var(--border-thin) solid var(--line-300);
  border-radius: var(--radius-md);
  padding: 0.7rem 0.95rem;
  transition: border-color var(--dur-base) var(--ease-soft), box-shadow var(--dur-base) var(--ease-soft), background var(--dur-base);
}
.fn-input::placeholder { color: var(--ink-300); }
.fn-input:hover { border-color: var(--green-300); }
.fn-input:focus { outline: none; border-color: var(--green-500); box-shadow: 0 0 0 3px var(--ring); background: var(--white); }
.fn-input--has-icon { padding-left: 2.6rem; }
.fn-input:disabled { opacity: .55; cursor: not-allowed; background: var(--cream-200); }
.fn-field--error .fn-input { border-color: var(--danger); }
.fn-field__hint { font-size: var(--text-xs); color: var(--ink-400); }
.fn-field--error .fn-field__hint { color: var(--danger); font-weight: 500; }
.fn-select-wrap { position: relative; }
.fn-select { appearance: none; -webkit-appearance: none; padding-right: 2.6rem; cursor: pointer; }
.fn-select-wrap::after {
  content: ""; position: absolute; right: 16px; top: 50%; width: 9px; height: 9px;
  border-right: 2px solid var(--green-600); border-bottom: 2px solid var(--green-600);
  transform: translateY(-65%) rotate(45deg); pointer-events: none; border-radius: 1px;
}
.fn-textarea { resize: vertical; min-height: 108px; line-height: 1.6; font-family: var(--font-sans); }

/* ── Layout shells (responsive) ───────────────────────────── */
.fn-header-inner { max-width: 1160px; margin: 0 auto; padding: 14px 28px; display: flex; align-items: center; gap: 28px; }
.fn-nav { margin-left: auto; display: flex; gap: 4px; flex-wrap: wrap; }
.fn-hero-grid { max-width: 1160px; margin: 0 auto; padding: 72px 28px 84px; display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 56px; align-items: center; }
.fn-hero-title { font-size: 60px; }
.fn-hero-art { width: 320px; height: 320px; }
.fn-spec-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
.fn-about-grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 0.8fr 1.2fr; gap: 56px; align-items: center; }
.fn-process-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; position: relative; }
.fn-contact-grid { max-width: 1080px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.05fr; gap: 48px; align-items: start; }
.fn-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.fn-section { padding: 88px 28px; }
.fn-section-title { font-size: 42px; }
.fn-h2-40 { font-size: 40px; }

/* ── Tablet ───────────────────────────────────────────────── */
@media (max-width: 960px) {
  .fn-spec-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 860px) {
  .fn-nav { display: none; }
  .fn-header-cta { margin-left: auto; }
}

/* ── Phone (apilado en una sola columna) ──────────────────── */
@media (max-width: 780px) {
  .fn-hero-grid { grid-template-columns: 1fr; gap: 36px; padding: 48px 22px 56px; }
  .fn-hero-title { font-size: clamp(34px, 9vw, 46px); }
  .fn-about-grid { grid-template-columns: 1fr; gap: 40px; }
  .fn-process-grid { grid-template-columns: 1fr; gap: 30px; }
  .fn-contact-grid { grid-template-columns: 1fr; gap: 32px; }
  .fn-section { padding: 56px 22px; }
  .fn-section-title { font-size: clamp(26px, 7vw, 34px); }
  .fn-h2-40 { font-size: clamp(26px, 7vw, 32px); }
}
@media (max-width: 540px) {
  .fn-spec-grid { grid-template-columns: 1fr; }
  .fn-form-row { grid-template-columns: 1fr; }
  .fn-header-inner { padding: 12px 16px; gap: 12px; }
  .fn-hero-art { width: 100%; max-width: 260px; height: auto; aspect-ratio: 1 / 1; }
}

<div id="root"></div>

<script type="text/babel" data-presets="react">
/* ── Components ─────────────────────────────────────────────── */

function Button({ variant = 'primary', size = 'md', fullWidth = false, disabled = false, type = 'button', href, iconLeft, iconRight, className = '', children, ...rest }) {
  const cls = ['fn-btn', `fn-btn--${variant}`, `fn-btn--${size}`, fullWidth ? 'fn-btn--block' : '', className].filter(Boolean).join(' ');
  const content = <>{iconLeft}{children && <span>{children}</span>}{iconRight}</>;
  if (href && !disabled) return <a className={cls} href={href} {...rest}>{content}</a>;
  return <button className={cls} type={type} disabled={disabled} aria-disabled={disabled || undefined} {...rest}>{content}</button>;
}

function Card({ variant = 'default', interactive = false, flat = false, media, title, footer, padding = 'md', className = '', children, ...rest }) {
  const variantCls = variant !== 'default' ? `fn-card--${variant}` : '';
  return (
    <div className={['fn-card', variantCls, interactive ? 'fn-card--interactive' : '', flat ? 'fn-card--flat' : '', className].filter(Boolean).join(' ')} {...rest}>
      {media && <div className="fn-card__media">{media}</div>}
      <div className={['fn-card__body', padding === 'lg' ? 'fn-card__body--lg' : ''].filter(Boolean).join(' ')}>
        {title && <h3 className="fn-card__title">{title}</h3>}
        {children}
      </div>
      {footer && <div className="fn-card__footer">{footer}</div>}
    </div>
  );
}

const ALERT_ICONS = {
  info: <path d="M12 16v-5M12 8h.01M12 21a9 9 0 100-18 9 9 0 000 18z" />,
  success: <path d="M9 12.5l2 2 4-4.5M12 21a9 9 0 100-18 9 9 0 000 18z" />,
  warning: <path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L14.4 3.9a2 2 0 00-3.4 0z" />,
  danger: <path d="M12 8v4M12 16h.01M12 21a9 9 0 100-18 9 9 0 000 18z" />,
};
function Alert({ variant = 'info', title, className = '', children, ...rest }) {
  return (
    <div className={['fn-alert', `fn-alert--${variant}`, className].filter(Boolean).join(' ')} role="status" {...rest}>
      <span className="fn-alert__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round">{ALERT_ICONS[variant]}</svg>
      </span>
      <div className="fn-alert__body">
        {title && <p className="fn-alert__title">{title}</p>}
        {children && <p className="fn-alert__text">{children}</p>}
      </div>
    </div>
  );
}

function Badge({ variant = 'neutral', dot = false, className = '', children, ...rest }) {
  return (
    <span className={['fn-badge', `fn-badge--${variant}`, className].filter(Boolean).join(' ')} {...rest}>
      {dot && <span className="fn-badge__dot"></span>}
      {children}
    </span>
  );
}

function Tag({ dot = false, selected = false, onClick, className = '', children, ...rest }) {
  return (
    <span className={['fn-tag', onClick ? 'fn-tag--clickable' : '', selected ? 'fn-tag--selected' : '', className].filter(Boolean).join(' ')} onClick={onClick} {...rest}>
      {dot && <span className="fn-tag__dot"></span>}
      {children}
    </span>
  );
}

function Input({ label, hint, error, required = false, icon, id, className = '', ...rest }) {
  const fid = id || (label ? 'fn-' + label.toLowerCase().replace(/\s+/g, '-') : undefined);
  const msg = error || hint;
  return (
    <div className={['fn-field', error ? 'fn-field--error' : '', className].filter(Boolean).join(' ')}>
      {label && <label className="fn-field__label" htmlFor={fid}>{label}{required && <span className="fn-field__req">*</span>}</label>}
      <div className="fn-field__wrap">
        {icon && <span className="fn-field__icon">{icon}</span>}
        <input id={fid} className={['fn-input', icon ? 'fn-input--has-icon' : ''].filter(Boolean).join(' ')} {...rest} />
      </div>
      {msg && <span className="fn-field__hint">{msg}</span>}
    </div>
  );
}

function Select({ label, hint, error, required = false, placeholder, options = [], id, className = '', children, ...rest }) {
  const fid = id || (label ? 'fn-' + label.toLowerCase().replace(/\s+/g, '-') : undefined);
  const msg = error || hint;
  return (
    <div className={['fn-field', error ? 'fn-field--error' : '', className].filter(Boolean).join(' ')}>
      {label && <label className="fn-field__label" htmlFor={fid}>{label}{required && <span className="fn-field__req">*</span>}</label>}
      <div className="fn-select-wrap">
        <select id={fid} className="fn-input fn-select" {...rest}>
          {placeholder && <option value="" disabled>{placeholder}</option>}
          {options.map((o) => {
            const val = typeof o === 'string' ? o : o.value;
            const lab = typeof o === 'string' ? o : o.label;
            return <option key={val} value={val}>{lab}</option>;
          })}
          {children}
        </select>
      </div>
      {msg && <span className="fn-field__hint">{msg}</span>}
    </div>
  );
}

function Textarea({ label, hint, error, required = false, id, className = '', rows = 4, ...rest }) {
  const fid = id || (label ? 'fn-' + label.toLowerCase().replace(/\s+/g, '-') : undefined);
  const msg = error || hint;
  return (
    <div className={['fn-field', error ? 'fn-field--error' : '', className].filter(Boolean).join(' ')}>
      {label && <label className="fn-field__label" htmlFor={fid}>{label}{required && <span className="fn-field__req">*</span>}</label>}
      <textarea id={fid} rows={rows} className="fn-input fn-textarea" {...rest} />
      {msg && <span className="fn-field__hint">{msg}</span>}
    </div>
  );
}

/* ── Icon helper (Lucide CDN) ─────────────────────────────── */
function Icon({ name, size = 22, stroke = 1.8, color }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const lib = window.lucide;
    if (ref.current && lib && lib.icons && lib.icons[name]) {
      const el = lib.createElement(lib.icons[name]);
      el.setAttribute('width', size);
      el.setAttribute('height', size);
      el.setAttribute('stroke-width', stroke);
      if (color) el.setAttribute('stroke', color);
      ref.current.innerHTML = '';
      ref.current.appendChild(el);
    }
  });
  return <span ref={ref} style={{ display: 'inline-flex', lineHeight: 0 }} />;
}

/* ── Envío de pedidos ─────────────────────────────────────────
   Con Supabase configurado (ui_kits/config.js) el pedido viaja a
   la nube y aparece en el panel de pedidos. Sin configurar, se
   guarda en esta computadora (modo de prueba). */
const FN_CFG = window.FN_CONFIG || {};
const SUPA_ON = !!(FN_CFG.SUPABASE_URL && FN_CFG.SUPABASE_ANON_KEY && !FN_CFG.SUPABASE_URL.includes('TU-PROYECTO'));

async function enviarPedido(p) {
  if (!SUPA_ON) {
    const arr = JSON.parse(localStorage.getItem('fn_pedidos') || '[]');
    arr.unshift({ id: 'local-' + Date.now(), creado: new Date().toISOString(), estado: 'nuevo', origen: 'web', ...p });
    localStorage.setItem('fn_pedidos', JSON.stringify(arr));
    return;
  }
  const r = await fetch(`${FN_CFG.SUPABASE_URL}/rest/v1/pedidos`, {
    method: 'POST',
    headers: {
      apikey: FN_CFG.SUPABASE_ANON_KEY,
      Authorization: `Bearer ${FN_CFG.SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      Prefer: 'return=minimal',
    },
    body: JSON.stringify({ ...p, origen: 'web' }),
  });
  if (!r.ok) throw new Error('No se pudo enviar el pedido');
}

function Contact({ formState }) {
  const { sent, setSent } = formState;
  const [campos, setCampos] = React.useState({ nombre: '', telefono: '', especialidad: '', detalle: '' });

    e.preventDefault();
    setEnviando(true); setErrEnvio('');

      await enviarPedido(campos);

      setSent(true);

                <span style={{ width: 46, height: 46, borderRadius: '50%', background: 'var(--green-100)', display: 'flex', alignItems: 'center', justifyContent: 'center', flex: 'none' }}>
                  <Icon name={icon} size={20} color="var(--green-700)" />
