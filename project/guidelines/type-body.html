<!-- @dsCard group="Type" viewport="700x260" name="Cuerpo y UI — sans" subtitle="Quicksand · cálido y redondeado para texto e interfaz" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--cream-50); }
  .ey { font-family: var(--font-sans); font-weight: 600; font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: var(--green-600); margin-bottom: 10px; }
  .body { font-family: var(--font-sans); font-weight: 400; font-size: 16px; line-height: 1.7; color: var(--ink-600); max-width: 560px; margin: 0; }
  .row { display: flex; gap: 18px; margin-top: 16px; font-family: var(--font-sans); }
  .row span { font-size: 13px; color: var(--ink-500); }
  .row b { font-weight: 700; color: var(--green-900); }
</style>
</head>
<body>
  <div class="ey">Sobre nosotros</div>
  <p class="body">Bajo la dirección de Patricia Victoria Nieto, preparamos cada fórmula a mano, pensando en cuidar tu salud y tu bienestar de manera personalizada.</p>
  <div class="row">
    <span style="font-weight:400">Regular 400</span>
    <span style="font-weight:500">Medium 500</span>
    <span style="font-weight:600">Semibold 600</span>
    <span><b>Bold 700</b></span>
  </div>
</body>
</html>
