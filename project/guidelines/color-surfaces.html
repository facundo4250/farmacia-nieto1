<!-- @dsCard group="Colors" viewport="700x180" name="Crema, menta y papel" subtitle="Superficies cálidas y frías que sostienen el verde" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--green-600); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); padding: 12px 12px 10px; display: flex; flex-direction: column; justify-content: flex-end; min-height: 92px; box-shadow: var(--shadow-sm); }
  .name { font-family: var(--font-sans); font-weight: 600; font-size: 12px; line-height: 1.2; color: var(--green-950); }
  .hex { font-family: var(--font-sans); font-weight: 500; font-size: 10.5px; opacity: .75; color: var(--green-950); letter-spacing: .02em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--cream-200)"><div class="name">Paper 200</div><div class="hex">#F8ECD4</div></div>
    <div class="sw" style="background:var(--cream-100)"><div class="name">Page 100</div><div class="hex">#FBF5E9</div></div>
    <div class="sw" style="background:var(--cream-50)"><div class="name">Card 50</div><div class="hex">#FEFCF6</div></div>
    <div class="sw" style="background:var(--mint-100)"><div class="name">Mint 100</div><div class="hex">#E1F2F1</div></div>
    <div class="sw" style="background:var(--mint-50)"><div class="name">Mint 50</div><div class="hex">#EEF8F7</div></div>
  </div>
</body>
</html>
