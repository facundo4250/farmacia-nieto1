<!-- @dsCard group="Brand" viewport="700x300" name="Logo principal" subtitle="Lockup completo sobre su caja de menta — protección y aire" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--green-500); display: flex; gap: 22px; align-items: center; justify-content: center; }
  .box { background: var(--mint-100); border-radius: var(--radius-xl); padding: 18px; box-shadow: var(--shadow-md); }
  .box img { width: 200px; height: 200px; object-fit: contain; border-radius: var(--radius-lg); }
  .notes { color: var(--cream-50); font-family: var(--font-sans); max-width: 240px; }
  .notes h4 { color: var(--cream-50); font-family: var(--font-serif); margin: 0 0 8px; font-size: 22px; }
  .notes p { font-size: 12.5px; line-height: 1.6; margin: 0 0 10px; opacity: .95; }
  .chip { display: inline-block; font-size: 10.5px; font-weight: 600; background: rgba(255,255,255,.18); padding: 3px 9px; border-radius: var(--radius-pill); }
</style>
</head>
<body>
  <div class="box"><img src="../assets/logo-nieto.png" alt="Logo Farmacia Nieto"></div>
  <div class="notes">
    <h4>Farmacia Nieto</h4>
    <p>El lockup vive en una caja de menta o crema con esquinas suaves. Reservá margen mínimo igual a la altura del mortero alrededor.</p>
    <span class="chip">Desde 1996</span>
  </div>
</body>
</html>
