<!-- @dsCard group="Type" viewport="700x190" name="Wordmark — script" subtitle="Sacramento · el gesto «farmacia», solo para la firma de marca" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--mint-100); display: flex; align-items: center; }
  .lockup { line-height: 1; }
  .script { font-family: var(--font-script); font-size: 76px; color: var(--green-700); }
  .caps { font-family: var(--font-serif); font-weight: 600; font-size: 30px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--green-300); margin-top: -6px; padding-left: 6px; }
  .meta { margin-left: auto; font-family: var(--font-sans); font-size: 11px; color: var(--green-700); text-align: right; line-height: 1.6; }
</style>
</head>
<body>
  <div class="lockup">
    <div class="script">farmacia</div>
    <div class="caps">Nieto</div>
  </div>
  <div class="meta">var(--font-script)<br>Sacramento · 400<br>accent only</div>
</body>
</html>
