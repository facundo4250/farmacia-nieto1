<!-- @dsCard group="Spacing" viewport="700x150" name="Escala de espaciado" subtitle="Base 4px — ritmo calmo y generoso" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--cream-50); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--green-300); border-radius: 3px; width: 100%; }
  .box { width: 44px; display: flex; align-items: flex-end; height: 64px; }
  .lbl { font-family: var(--font-sans); font-size: 10.5px; color: var(--ink-500); font-weight: 600; }
  .px { font-family: var(--font-sans); font-size: 9px; color: var(--ink-400); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box"><div class="bar" style="height:4px"></div></div><div class="lbl">1</div><div class="px">4</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:8px"></div></div><div class="lbl">2</div><div class="px">8</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:12px"></div></div><div class="lbl">3</div><div class="px">12</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:16px"></div></div><div class="lbl">4</div><div class="px">16</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:24px"></div></div><div class="lbl">5</div><div class="px">24</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:32px"></div></div><div class="lbl">6</div><div class="px">32</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:40px"></div></div><div class="lbl">7</div><div class="px">40</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:48px"></div></div><div class="lbl">8</div><div class="px">48</div></div>
    <div class="item"><div class="box"><div class="bar" style="height:64px"></div></div><div class="lbl">9</div><div class="px">64</div></div>
  </div>
</body>
</html>
