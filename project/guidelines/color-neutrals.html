<!-- @dsCard group="Colors" viewport="700x170" name="Neutros y estados" subtitle="Tinta verde-cálida para texto · estados que viven en la paleta" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--cream-50); display: grid; gap: 14px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-sm); padding: 10px 10px 8px; display: flex; flex-direction: column; justify-content: flex-end; min-height: 56px; }
  .name { font-family: var(--font-sans); font-weight: 600; font-size: 11px; line-height: 1.15; }
  .hex { font-family: var(--font-sans); font-weight: 500; font-size: 9.5px; opacity: .8; }
  .lt { color: var(--cream-50); } .dk { color: var(--ink-900); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw lt" style="background:var(--ink-900)"><div class="name">Ink 900</div><div class="hex">#20291F</div></div>
    <div class="sw lt" style="background:var(--ink-600)"><div class="name">Body 600</div><div class="hex">#3C4A3A</div></div>
    <div class="sw lt" style="background:var(--ink-400)"><div class="name">Muted 400</div><div class="hex">#7D8A79</div></div>
    <div class="sw dk" style="background:var(--line-300)"><div class="name">Line 300</div><div class="hex">#D3DCCB</div></div>
    <div class="sw dk" style="background:var(--line-100)"><div class="name">Line 100</div><div class="hex">#EFEEDE</div></div>
  </div>
  <div class="row">
    <div class="sw lt" style="background:var(--success)"><div class="name">Success</div><div class="hex">#4E7A45</div></div>
    <div class="sw dk" style="background:var(--warning)"><div class="name">Warning</div><div class="hex">#D4A32C</div></div>
    <div class="sw lt" style="background:var(--danger)"><div class="name">Danger</div><div class="hex">#B4503E</div></div>
    <div class="sw lt" style="background:var(--info)"><div class="name">Info</div><div class="hex">#4A7D86</div></div>
    <div class="sw dk" style="background:var(--success-soft)"><div class="name">Soft</div><div class="hex">tints</div></div>
  </div>
</body>
</html>
