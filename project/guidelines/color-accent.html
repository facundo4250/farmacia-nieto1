<!-- @dsCard group="Colors" viewport="700x180" name="Acento dorado y madera" subtitle="La flor y el pestle — calidez que ilumina sin gritar" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--cream-100); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); padding: 12px 12px 10px; display: flex; flex-direction: column; justify-content: flex-end; min-height: 92px; box-shadow: var(--shadow-xs); }
  .name { font-family: var(--font-sans); font-weight: 600; font-size: 12px; line-height: 1.2; }
  .hex { font-family: var(--font-sans); font-weight: 500; font-size: 10.5px; opacity: .8; letter-spacing: .02em; }
  .dk { color: var(--wood-700); }
  .lt { color: var(--cream-50); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw dk" style="background:var(--gold-400)"><div class="name">Petal 400</div><div class="hex">#F2C94C</div></div>
    <div class="sw dk" style="background:var(--gold-500)"><div class="name">Honey 500</div><div class="hex">#DDB438</div></div>
    <div class="sw lt" style="background:var(--gold-700)"><div class="name">Amber 700</div><div class="hex">#B8881F</div></div>
    <div class="sw lt" style="background:var(--wood-500)"><div class="name">Wood 500</div><div class="hex">#A06A3C</div></div>
    <div class="sw lt" style="background:var(--wood-700)"><div class="name">Wood 700</div><div class="hex">#6F551A</div></div>
    <div class="sw dk" style="background:var(--gold-100)"><div class="name">Wash 100</div><div class="hex">#FBF0CF</div></div>
  </div>
</body>
</html>
