<!-- @dsCard group="Spacing" viewport="700x180" name="Elevación / sombras" subtitle="Bajas y cálidas, tintadas de verde — nunca duras" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 28px; background: var(--cream-100); }
  .row { display: flex; gap: 22px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .sq { width: 96px; height: 64px; background: var(--cream-50); border-radius: var(--radius-md); }
  .lbl { font-family: var(--font-sans); font-size: 11px; font-weight: 600; color: var(--ink-500); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="sq" style="box-shadow:var(--shadow-xs)"></div><div class="lbl">xs</div></div>
    <div class="item"><div class="sq" style="box-shadow:var(--shadow-sm)"></div><div class="lbl">sm</div></div>
    <div class="item"><div class="sq" style="box-shadow:var(--shadow-md)"></div><div class="lbl">md</div></div>
    <div class="item"><div class="sq" style="box-shadow:var(--shadow-lg)"></div><div class="lbl">lg</div></div>
    <div class="item"><div class="sq" style="box-shadow:var(--shadow-gold)"></div><div class="lbl">gold</div></div>
  </div>
</body>
</html>
