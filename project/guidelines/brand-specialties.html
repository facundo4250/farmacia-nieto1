<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--mint-50); }
  .wrap { display: flex; flex-wrap: wrap; gap: 10px; }
  .chip { font-family: var(--font-sans); font-weight: 600; font-size: 13.5px; color: var(--green-900); background: var(--cream-50); border: 1.5px solid var(--green-200); padding: 9px 16px; border-radius: var(--radius-pill); box-shadow: var(--shadow-xs); display: inline-flex; align-items: center; gap: 8px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold-500); }
</style>
</head>
<body>
  <div class="wrap">
    <span class="chip"><span class="dot"></span>Medicina Ortomolecular</span>
    <span class="chip"><span class="dot"></span>Dermocosmética</span>
    <span class="chip"><span class="dot"></span>Homeopatía</span>
    <span class="chip"><span class="dot"></span>Alopatía</span>
    <span class="chip"><span class="dot"></span>Fitoterapia</span>
    <span class="chip"><span class="dot"></span>Florales</span>
    <span class="chip"><span class="dot"></span>Probióticos</span>
    <span class="chip"><span class="dot"></span>Hormonas Bioidénticas</span>
  </div>
</body>
</html>
