<!-- @dsCard group="Spacing" viewport="700x170" name="Radios de esquina" subtitle="Suaves y de boticario — del chip al panel destacado" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 28px; background: var(--cream-50); }
  .row { display: flex; gap: 16px; align-items: flex-start; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .sq { width: 78px; height: 78px; background: var(--green-100); border: 1.5px solid var(--green-300); border-top-left-radius: 0; }
  .lbl { font-family: var(--font-sans); font-size: 11px; font-weight: 600; color: var(--ink-600); }
  .px { font-family: var(--font-sans); font-size: 9.5px; color: var(--ink-400); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="sq" style="border-radius:var(--radius-sm)"></div><div class="lbl">sm</div><div class="px">8px</div></div>
    <div class="item"><div class="sq" style="border-radius:var(--radius-md)"></div><div class="lbl">md</div><div class="px">12px</div></div>
    <div class="item"><div class="sq" style="border-radius:var(--radius-lg)"></div><div class="lbl">lg · card</div><div class="px">18px</div></div>
    <div class="item"><div class="sq" style="border-radius:var(--radius-xl)"></div><div class="lbl">xl · panel</div><div class="px">26px</div></div>
    <div class="item"><div class="sq" style="border-radius:var(--radius-2xl)"></div><div class="lbl">2xl</div><div class="px">36px</div></div>
    <div class="item"><div class="sq" style="border-radius:var(--radius-pill)"></div><div class="lbl">pill</div><div class="px">999</div></div>
  </div>
</body>
</html>
