<!-- @dsCard group="Type" viewport="700x300" name="Escala tipográfica" subtitle="Del titular hero a la etiqueta — ritmo de tamaños" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 28px; background: var(--cream-50); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--line-100); }
  .r:last-child { border: 0; }
  .t { font-family: var(--font-serif); font-weight: 600; color: var(--green-900); line-height: 1.05; }
  .lbl { margin-left: auto; font-family: var(--font-sans); font-size: 10.5px; color: var(--ink-400); white-space: nowrap; }
</style>
</head>
<body>
  <div class="r"><span class="t" style="font-size:48px">Aa</span><span class="lbl">3xl · 48 / display</span></div>
  <div class="r"><span class="t" style="font-size:36px">Bienestar</span><span class="lbl">2xl · 36 / h2</span></div>
  <div class="r"><span class="t" style="font-size:28px">Fórmula magistral</span><span class="lbl">xl · 28 / h3</span></div>
  <div class="r"><span class="t" style="font-size:22px;font-family:var(--font-sans);font-weight:600">Subtítulo de sección</span><span class="lbl">lg · 22</span></div>
  <div class="r"><span class="t" style="font-size:16px;font-family:var(--font-sans);font-weight:400;color:var(--ink-600)">Texto de cuerpo cómodo de leer</span><span class="lbl">base · 16</span></div>
  <div class="r"><span class="t" style="font-size:12px;font-family:var(--font-sans);font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--green-600)">Etiqueta</span><span class="lbl">xs · 12 caps</span></div>
</body>
</html>
