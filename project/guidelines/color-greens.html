<!-- @dsCard group="Colors" viewport="700x180" name="Verdes botánicos" subtitle="El corazón de la marca — del pino profundo al salvia del fondo" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--cream-50); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); padding: 12px 12px 10px; display: flex; flex-direction: column; justify-content: flex-end; min-height: 92px; box-shadow: var(--shadow-xs); }
  .name { font-family: var(--font-sans); font-weight: 600; font-size: 12px; line-height: 1.2; }
  .hex { font-family: var(--font-sans); font-weight: 500; font-size: 10.5px; opacity: .8; letter-spacing: .02em; }
  .lt { color: var(--cream-50); }
  .dk { color: var(--green-950); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw lt" style="background:var(--green-900)"><div class="name">Forest 900</div><div class="hex">#1E4D2B</div></div>
    <div class="sw lt" style="background:var(--green-800)"><div class="name">Pine 800</div><div class="hex">#225B30</div></div>
    <div class="sw lt" style="background:var(--green-600)"><div class="name">Mortar 600</div><div class="hex">#4E7A45</div></div>
    <div class="sw lt" style="background:var(--green-500)"><div class="name">Sage 500</div><div class="hex">#6F8F6C</div></div>
    <div class="sw dk" style="background:var(--green-300)"><div class="name">Mint-sage 300</div><div class="hex">#9BC3AE</div></div>
    <div class="sw dk" style="background:var(--green-100)"><div class="name">Tint 100</div><div class="hex">#E3EFE4</div></div>
  </div>
</body>
</html>
