<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  body { margin: 0; padding: 26px; background: var(--cream-100); }
  .grid { display: grid; gap: 20px; }
  .group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .lbl { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--green-600); margin-bottom: 9px; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.FarmaciaNietoDesignSystem_3d24ed;
const { Badge, Tag, Alert, Tooltip, IconButton } = NS;
function Demo(){
  return (
    <div className="grid">
      <div>
        <div className="lbl">Badges</div>
        <div className="group">
          <Badge variant="success" dot>Lista para retirar</Badge>
          <Badge variant="warning" dot>En preparación</Badge>
          <Badge variant="info" dot>Recibida</Badge>
          <Badge variant="gold">Nuevo</Badge>
          <Badge variant="solid">8 especialidades</Badge>
          <Badge variant="danger" dot>Vencida</Badge>
        </div>
      </div>
      <div>
        <div className="lbl">Tags &amp; filtros</div>
        <div className="group">
          <Tag dot>Homeopatía</Tag>
          <Tag selected>Dermocosmética</Tag>
          <Tag>Fitoterapia</Tag>
          <Tag onRemove={()=>{}}>Florales</Tag>
          <Tooltip content="Elaborado en 48–72 h"><Tag dot>Probióticos</Tag></Tooltip>
        </div>
      </div>
      <div className="group" style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px'}}>
        <Alert variant="success" title="¡Pedido recibido!">Te avisamos por WhatsApp cuando esté lista.</Alert>
        <Alert variant="warning">Tu fórmula requiere receta médica vigente.</Alert>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
