<!-- @dsCard group="Slides" viewport="1280x720" name="Slide — Contacto" subtitle="Cierre con datos de contacto y emblema, estilo flyer" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; }
  .slide { width: 1280px; height: 720px; background: var(--green-500); position: relative; overflow: hidden; display: grid; grid-template-columns: 1fr 1fr; box-sizing: border-box; font-family: var(--font-sans); }
  .left { padding: 84px 72px; display: flex; flex-direction: column; justify-content: center; }
  .eyebrow { font-weight: 600; font-size: 15px; letter-spacing: .2em; text-transform: uppercase; color: var(--gold-300); }
  h2 { font-family: var(--font-serif); font-weight: 600; font-size: 48px; line-height: 1.08; color: var(--cream-50); margin: 14px 0 36px; }
  .item { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .ico { width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,.18); display: flex; align-items: center; justify-content: center; color: var(--cream-50); flex: none; }
  .k { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--mint-100); font-weight: 600; opacity: .85; }
  .v { font-size: 21px; font-weight: 600; color: var(--cream-50); }
  .right { background: var(--mint-50); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; }
  .right img { width: 280px; }
  .right .wm { font-family: var(--font-script); font-size: 50px; color: var(--green-700); line-height: .8; }
  .right .nm { font-family: var(--font-serif); font-weight: 600; font-size: 26px; letter-spacing: .24em; text-transform: uppercase; color: var(--green-400); }
</style>
</head>
<body>
<div class="slide">
  <div class="left">
    <div class="eyebrow">Estamos para ayudarte</div>
    <h2>Comunicate con<br>nosotros</h2>
    <div class="item"><div class="ico"><i data-lucide="phone"></i></div><div><div class="k">WhatsApp</div><div class="v">(+54) 291 432-7031</div></div></div>
    <div class="item"><div class="ico"><i data-lucide="mail"></i></div><div><div class="k">Email</div><div class="v">farmacia_nieto@hotmail.com</div></div></div>
    <div class="item"><div class="ico"><i data-lucide="instagram"></i></div><div><div class="k">Instagram</div><div class="v">@farmacia.nieto</div></div></div>
  </div>
  <div class="right">
    <img src="../assets/emblem-nieto.png" alt="">
    <div class="wm">farmacia</div>
    <div class="nm">Nieto</div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
