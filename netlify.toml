# Configuración de publicación en Netlify para Farmacia Nieto
# - La página principal ("/") lleva a la web del cliente
# - "/panel" lleva al panel de pedidos (que igual pide usuario y contraseña)

[[redirects]]
  from = "/"
  to = "/ui_kits/web/index.html"
  status = 302

[[redirects]]
  from = "/panel"
  to = "/ui_kits/admin/index.html"
  status = 302

# No cachear el HTML, para que los cambios se vean siempre al instante
[[headers]]
  for = "/ui_kits/web/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/ui_kits/admin/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
